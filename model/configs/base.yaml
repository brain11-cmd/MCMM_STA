# ============================================================================
# Physics-Informed Multi-Anchor GNN STA — v9 Configuration
# ============================================================================

seed: 42
data_root: "../benchmark/test_output"
checkpoint_dir: "checkpoints"
num_workers: 8

data:
  # Runtime-only label cleaning (raw files remain unchanged).
  clamp_negative_delay: true
  delay_floor: 0.0
  # Print per-split/per-benchmark negative-delay ratio at startup.
  audit_negative_delay: true

benchmarks:
  - spi
  - gcd
  - uart
  - chameleon
  - fifo
  - dynamic_node
  - aes
  - jpeg
  - mock-alu

anchors:
  - ff1p16vn40c
  - tt0p85v25c
  - ss0p7v25c

# ---- Model ----
model:
  hidden_dim: 128
  gnn_layers: 3
  tau_sage: 1.0
  edge_mlp_hidden: 256
  edge_mlp_layers: 3
  process_embed_dim: 8
  beta: 1.0
  scale_clamp: 3.0
  tau_sta: 0.07
  dropout: 0.1
  gnn_dropout: 0.1
  residual_alpha: 0.5

  # FiLM conditioning
  use_film: true
  film_mode: head_only        # "head_only": GNN stays corner-agnostic, FiLM only on edge head
                               # "full": FiLM on input_proj + every GNN layer + edge head
  film_hidden: 128
  film_gamma_scale: 0.5
  film_warmup_epochs: 10      # FiLM strength ramps 0→1 over this many epochs

  # Endpoint residual head (absorbs STA propagation bias on deep graphs)
  use_endpoint_residual: true

  # v9: PVT separable conditioning (additive decomposition: e_p + e_v + e_t)
  pvt_dim: 16

  # v9: Cell/Net dual edge head (separate MLPs for cell and net arcs)
  use_dual_edge_head: true
  cell_mlp_hidden: 192
  net_mlp_hidden: 128

  # v9: Global token (lightweight graph-level context injection per GNN layer)
  use_global_token: true

# ---- Training ----
training:
  epochs: 200
  lr: 3.0e-4
  weight_decay: 1.0e-4
  batch_size: 1
  warmup_epochs: 5
  scheduler: cosine
  patience: 50
  topk_best_keep: 3
  best_warmup_epochs: 15
  ema_alpha: 0.3
  grad_clip: 5.0
  save_every: 20
  tf_interval: 20
  tf_ratio_start: 0.25
  tf_hold_frac: 0.15
  tf_end_frac: 0.25

# ---- Loss ----
loss:
  huber_delta: 1.0
  lambda_edge: 0.15
  lambda_edge_init: 0.30
  lambda_kl: 0.01
  lambda_ent: 0.001
  lambda_scale: 0.0001

  neg_delay_mode: strict
  d_floor: 0.0
  asinh_scale: 1.0
  lambda_neg: 1.0e-4
  lambda_at: 0.05
  lambda_at_init: 0.2
  schedule_frac: 0.4
  slack_loss_alpha: 0.7

  # Critical-endpoint optimization (disjoint: L_slack covers non-topk, L_worst covers topk)
  lambda_worst: 0.25
  worst_frac: 0.2
  worst_warmup_ratio: 0.3

  # v9: Endpoint residual L2 regularization (prevents calibration head memorizing)
  lambda_delta: 1.0e-3

  # FiLM γ/β L2 regularization (active after film_warmup_epochs)
  lambda_film: 5.0e-4
